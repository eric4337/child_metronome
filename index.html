<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童動物節拍器 - 鐘擺版 🐷🐻🦊</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0fdf4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* === 新的傳統擺動元件 === */
        #pendulum-container {
            width: 300px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* 使擺桿從底部升起 */
            margin-bottom: 20px;
            position: relative;
        }
        #pendulum-pivot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #475569;
            position: absolute;
            bottom: -7.5px; /* 旋轉點對齊在底部 */
            z-index: 20;
        }
        #pendulum-arm {
            width: 10px;
            height: 200px;
            background-color: #64748b;
            border-radius: 5px;
            transform-origin: bottom center; /* 關鍵：旋轉點在底部 */
            /* 基礎 transition，持續時間將在 JS 中動態更改 */
            transition: transform 0.1s ease-out; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            bottom: 0;
            z-index: 10;
        }
        #pendulum-bob {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f43f5e; /* 配重顏色 */
            border: 4px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: -30px; /* 向上移動以在桿頂部對齊 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px; /* emoji大小 */
        }
        /* 擺動角度類 */
        .swing-left { transform: rotate(-40deg); }
        .swing-right { transform: rotate(40deg); }
        /* ============================ */

        .controls {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 30; /* 確保控制面板在最上層 */
        }
        button {
            font-size: 24px;
            padding: 10px 25px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background-color: #3b82f6;
            color: white;
            transition: background 0.2s;
        }
        button:active { background-color: #1d4ed8; }
        #start-btn { background-color: #10b981; }
        #start-btn.playing { background-color: #ef4444; }
        .tempo-display {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div id="pendulum-container">
        <div id="pendulum-pivot"></div>
        <div id="pendulum-arm">
            <div id="pendulum-bob">
                <span id="bob-emoji">🐷</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="tempo-display">
            <span id="animal-icon">🐢</span> <span id="bpm-text">90</span> BPM
        </div>
        
        <input type="range" id="tempo-slider" min="40" max="200" value="90" style="width: 200px;">
        <br>
        <button id="minus-btn">－</button>
        <button id="plus-btn">＋</button>
        <br>
        <button id="start-btn">開始 🎵</button>
    </div>

    <script>
        let audioCtx = null;
        let isPlaying = false;
        let bpm = 90;
        let intervalId = null;
        let isSwingLeft = true; // 追蹤擺動方向

        // 新的 DOM 元素
        const pendulumArm = document.getElementById('pendulum-arm');
        const bobEmojiSpan = document.getElementById('bob-emoji');

        // 原有的 DOM 元素
        const startBtn = document.getElementById('start-btn');
        const bpmText = document.getElementById('bpm-text');
        const tempoSlider = document.getElementById('tempo-slider');
        const animalIcon = document.getElementById('animal-icon');

        // 發出嗶聲的函數 (Web Audio API)
        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. 播放聲音
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); // 頻率 800Hz
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);

            // 2. 修改：傳統視覺擺動效果
            if (isSwingLeft) {
                pendulumArm.classList.add('swing-left');
                pendulumArm.classList.remove('swing-right');
            } else {
                pendulumArm.classList.add('swing-right');
                pendulumArm.classList.remove('swing-left');
            }
            isSwingLeft = !isSwingLeft; // 切換方向
        }

        function updateTempo() {
            bpmText.innerText = bpm;
            tempoSlider.value = bpm;
            
            // 1. 換動物圖案 (不變)
            let bobEmojiText = '🐷'; // 配重動物
            if (bpm < 70) {
                animalIcon.innerText = '🐌';
                bobEmojiText = '🐷';
            } else if (bpm < 110) {
                animalIcon.innerText = '🐢';
                bobEmojiText = '🐻';
            } else if (bpm < 150) {
                animalIcon.innerText = '🐇';
                bobEmojiText = '🦊';
            } else {
                animalIcon.innerText = '🐆';
                bobEmojiText = '🐯';
            }
            bobEmojiSpan.innerText = bobEmojiText;

            // 2. 新增：計算並動態應用視覺擺動的 transition 持續時間
            const transitionDurationSeconds = (60 / bpm); // 計算秒數
            // 設置內聯 transition 持續時間，使擺動與聲音同步
            pendulumArm.style.transitionDuration = `${transitionDurationSeconds}s`;

            if (isPlaying) {
                stopMetronome();
                startMetronome();
            }
        }

        function startMetronome() {
            const interval = (60 / bpm) * 1000;
            playClick(); // 第一下直接響，並開始擺動
            intervalId = setInterval(playClick, interval);
        }

        function stopMetronome() {
            clearInterval(intervalId);
            // 停止時重置鐘擺到垂直位置
            pendulumArm.classList.remove('swing-left', 'swing-right');
        }

        startBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopMetronome();
                startBtn.innerText = '開始 🎵';
                startBtn.classList.remove('playing');
            } else {
                startMetronome();
                startBtn.innerText = '停止 🛑';
                startBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        tempoSlider.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value);
            updateTempo();
        });

        document.getElementById('plus-btn').addEventListener('click', () => {
            if (bpm < 200) { bpm++; updateTempo(); }
        });

        document.getElementById('minus-btn').addEventListener('click', () => {
            if (bpm > 40) { bpm--; updateTempo(); }
        });
    </script>
</body>
</html>
